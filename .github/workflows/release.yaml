name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - release

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: ubuntu-22.04-arm
            args: ""
          - platform: windows-latest
            args: ""
          - platform: ubuntu-22.04
            mobile: android
            args: "--apk"
            targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
          - platform: macos-latest
            mobile: ios
            args: "--no-sign"
            targets: aarch64-apple-ios

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup bun
        uses: oven-sh/setup-bun@v2

      - name: setup Java (Android)
        if: matrix.mobile == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: setup Android NDK
        if: matrix.mobile == 'android'
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: setup Android SDK
        if: matrix.mobile == 'android'
        uses: android-actions/setup-android@v3

      - name: create Android debug keystore (CI)
        if: matrix.mobile == 'android'
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkeypair -v \
              -keystore ~/.android/debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: install dependencies (ubuntu desktop)
        if: matrix.platform == 'ubuntu-22.04' && matrix.mobile != 'android'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: install dependencies (ubuntu arm desktop)
        if: matrix.platform == 'ubuntu-22.04-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.targets || (matrix.platform == 'macos-latest' && matrix.mobile != 'ios' && 'aarch64-apple-darwin,x86_64-apple-darwin') || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: install frontend dependencies
        run: bun install --frozen-lockfile

      # v0 tag does not include `mobile` yet; dev branch builds Android APK + iOS IPA.
      - uses: tauri-apps/tauri-action@dev
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI: "true"
          NDK_HOME: ${{ matrix.mobile == 'android' && steps.setup-ndk.outputs.ndk-path || '' }}
        with:
          tagName: app-v__VERSION__
          releaseName: "App v__VERSION__"
          releaseBody: |
            Desktop installers and mobile builds for this version.

            - **Android**: universal APK (`--apk`), signed in CI with the standard Android debug keystore for sideloading (`adb install`). For Play Store distribution, add `keystore.properties` and an upload keystore (see [Tauri Android signing](https://v2.tauri.app/distribute/sign/android/)).
            - **iOS**: IPA built with `--no-sign` for CI; install via Xcode, AltStore, or re-sign with your Apple Developer account.
          releaseDraft: false
          prerelease: false
          tauriScript: bun run tauri
          mobile: ${{ matrix.mobile || '' }}
          args: ${{ matrix.args }}
          uploadUpdaterJson: ${{ matrix.mobile == '' }}
          uploadUpdaterSignatures: ${{ matrix.mobile == '' }}
